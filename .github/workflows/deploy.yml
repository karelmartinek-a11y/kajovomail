name: Deploy

on:
  push:
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy To Production Server
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: SSH Deploy
        uses: appleboy/ssh-action@v1.2.0
        env:
          KAJOVOMAIL_LOGIN_EMAIL: ${{ vars.KAJOVOMAIL_LOGIN_EMAIL }}
          KAJOVOMAIL_LOGIN_PASSWORD: ${{ secrets.KAJOVOMAIL_LOGIN_PASSWORD }}
        with:
          host: ${{ secrets.PROD_HOST }}
          port: ${{ secrets.PROD_PORT }}
          username: ${{ secrets.PROD_USER }}
          password: ${{ secrets.PROD_PASSWORD }}
          script_stop: true
          command_timeout: 25m
          envs: KAJOVOMAIL_LOGIN_EMAIL,KAJOVOMAIL_LOGIN_PASSWORD
          script: |
            set -euo pipefail
            cd /opt/kajovomail
            touch backend/.env
            tmp_env="$(mktemp)"
            grep -v '^KAJOVOMAIL_LOGIN_EMAIL=' backend/.env | grep -v '^KAJOVOMAIL_LOGIN_PASSWORD=' > "$tmp_env" || true
            printf "KAJOVOMAIL_LOGIN_EMAIL=%s\n" "$KAJOVOMAIL_LOGIN_EMAIL" >> "$tmp_env"
            printf "KAJOVOMAIL_LOGIN_PASSWORD=%s\n" "$KAJOVOMAIL_LOGIN_PASSWORD" >> "$tmp_env"
            mv "$tmp_env" backend/.env
            /opt/kajovomail/bootstrap/deploy-local.sh
            for i in $(seq 1 20); do
              if curl -fsS http://127.0.0.1:18100/api/v1/health/live >/dev/null \
                && curl -fsS http://127.0.0.1:18100/api/v1/health/ready >/dev/null; then
                echo "Healthcheck OK (pokus $i)."
                exit 0
              fi
              echo "Cekam na backend... pokus $i/20"
              sleep 2
            done
            echo "Healthcheck timeout po 40s."
            exit 1
