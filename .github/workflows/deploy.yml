name: Deploy

on:
  push:
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy To Production Server
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Build web bundle
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Upload web dist to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PROD_HOST }}
          port: ${{ secrets.PROD_PORT }}
          username: ${{ secrets.PROD_USER }}
          password: ${{ secrets.PROD_PASSWORD }}
          source: "web/dist/*"
          target: "/tmp/kajovomail-web-dist"

      - name: SSH Deploy
        uses: appleboy/ssh-action@v1.2.0
        env:
          DEPLOY_SHA: ${{ github.sha }}
          KAJOVOMAIL_LOGIN_EMAIL: ${{ vars.KAJOVOMAIL_LOGIN_EMAIL }}
          KAJOVOMAIL_LOGIN_PASSWORD: ${{ secrets.KAJOVOMAIL_LOGIN_PASSWORD }}
        with:
          host: ${{ secrets.PROD_HOST }}
          port: ${{ secrets.PROD_PORT }}
          username: ${{ secrets.PROD_USER }}
          password: ${{ secrets.PROD_PASSWORD }}
          script_stop: true
          command_timeout: 25m
          envs: DEPLOY_SHA,KAJOVOMAIL_LOGIN_EMAIL,KAJOVOMAIL_LOGIN_PASSWORD
          script: |
            set -euo pipefail
            export KAJOVOMAIL_LOGIN_EMAIL
            export KAJOVOMAIL_LOGIN_PASSWORD
            /opt/kajovomail/bootstrap/deploy-local.sh
            backend_container="$(docker ps --format '{{.Names}}' | grep '^kajovomail-backend-' | head -n 1 || true)"
            if [ -z "$backend_container" ]; then
              echo "Backend container was not found after deploy."
              exit 1
            fi
            docker exec "$backend_container" alembic -c backend/alembic.ini upgrade head || true
            db_container="$(docker ps --format '{{.Names}}' | grep '^kajovomail-db-' | head -n 1 || true)"
            if [ -z "$db_container" ]; then
              echo "Database container was not found after deploy."
              exit 1
            fi
            docker exec "$db_container" psql -U kajovo -d kajovo -v ON_ERROR_STOP=1 -c "ALTER TABLE users ADD COLUMN IF NOT EXISTS openai_api_key TEXT;"
            docker exec "$db_container" psql -U kajovo -d kajovo -v ON_ERROR_STOP=1 -c "ALTER TABLE users ADD COLUMN IF NOT EXISTS ai_response_style VARCHAR(32) NOT NULL DEFAULT 'balanced';"
            docker exec "$db_container" psql -U kajovo -d kajovo -v ON_ERROR_STOP=1 -c "ALTER TABLE users ADD COLUMN IF NOT EXISTS openai_model VARCHAR(64);"
            has_key="$(docker exec "$db_container" psql -U kajovo -d kajovo -tAc "SELECT 1 FROM information_schema.columns WHERE table_name='users' AND column_name='openai_api_key' LIMIT 1;" | tr -d '[:space:]')"
            has_style="$(docker exec "$db_container" psql -U kajovo -d kajovo -tAc "SELECT 1 FROM information_schema.columns WHERE table_name='users' AND column_name='ai_response_style' LIMIT 1;" | tr -d '[:space:]')"
            has_model="$(docker exec "$db_container" psql -U kajovo -d kajovo -tAc "SELECT 1 FROM information_schema.columns WHERE table_name='users' AND column_name='openai_model' LIMIT 1;" | tr -d '[:space:]')"
            if [ "$has_key" != "1" ] || [ "$has_style" != "1" ] || [ "$has_model" != "1" ]; then
              echo "User AI settings columns verification failed."
              exit 1
            fi
            site_conf="$(grep -Rsl 'server_name[[:space:]]\\+mail\\.hcasc\\.cz' /etc/nginx/sites-enabled /etc/nginx/sites-available 2>/dev/null | head -n 1 || true)"
            if [ -n "$site_conf" ]; then
              web_root="$(awk '/^[[:space:]]*root[[:space:]]+/ {print $2}' "$site_conf" | tr -d ';' | head -n 1 || true)"
              if [ -n "$web_root" ] && [ -d "$web_root" ] && [ -d /tmp/kajovomail-web-dist/web/dist ]; then
                if command -v sudo >/dev/null 2>&1; then
                  sudo cp -a /tmp/kajovomail-web-dist/web/dist/. "$web_root"/ || cp -a /tmp/kajovomail-web-dist/web/dist/. "$web_root"/
                else
                  cp -a /tmp/kajovomail-web-dist/web/dist/. "$web_root"/
                fi
              fi
              if command -v sudo >/dev/null 2>&1; then
                sudo nginx -t || nginx -t
                sudo systemctl reload nginx || systemctl reload nginx || true
              else
                nginx -t
                systemctl reload nginx || true
              fi
            fi
            for i in $(seq 1 20); do
              if curl -fsS http://127.0.0.1:18100/api/v1/health/live >/dev/null \
                && curl -fsS http://127.0.0.1:18100/api/v1/health/ready >/dev/null; then
                echo "Healthcheck OK (pokus $i)."
                exit 0
              fi
              echo "Cekam na backend... pokus $i/20"
              sleep 2
            done
            echo "Healthcheck timeout po 40s."
            exit 1
