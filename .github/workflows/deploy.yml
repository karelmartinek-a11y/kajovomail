name: Deploy

on:
  push:
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy To Production Server
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Build web bundle
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Upload web dist to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PROD_HOST }}
          port: ${{ secrets.PROD_PORT }}
          username: ${{ secrets.PROD_USER }}
          password: ${{ secrets.PROD_PASSWORD }}
          source: "web/dist/*"
          target: "/tmp/kajovomail-web-dist"

      - name: SSH Deploy
        uses: appleboy/ssh-action@v1.2.0
        env:
          DEPLOY_SHA: ${{ github.sha }}
          KAJOVOMAIL_LOGIN_EMAIL: ${{ secrets.KAJOVOMAIL_LOGIN_EMAIL }}
          KAJOVOMAIL_LOGIN_PASSWORD: ${{ secrets.KAJOVOMAIL_LOGIN_PASSWORD }}
        with:
          host: ${{ secrets.PROD_HOST }}
          port: ${{ secrets.PROD_PORT }}
          username: ${{ secrets.PROD_USER }}
          password: ${{ secrets.PROD_PASSWORD }}
          script_stop: true
          command_timeout: 25m
          envs: DEPLOY_SHA,KAJOVOMAIL_LOGIN_EMAIL,KAJOVOMAIL_LOGIN_PASSWORD
          script: |
            set -euo pipefail
            export KAJOVOMAIL_LOGIN_EMAIL
            export KAJOVOMAIL_LOGIN_PASSWORD
            if [ -d /opt/kajovomail/.git ]; then
              cd /opt/kajovomail
              git fetch --all --prune
              git checkout main
              git reset --hard "$DEPLOY_SHA"
            fi
            /opt/kajovomail/bootstrap/deploy-local.sh
            if [ -f /opt/kajovomail/infra/docker-compose.prod.yml ]; then
              echo "Rebuilding backend containers with latest source..."
              cd /opt/kajovomail
              docker compose -f infra/docker-compose.prod.yml up -d --build backend worker
            fi
            backend_container="$(docker ps --format '{{.Names}}' | grep '^kajovomail-backend-' | head -n 1 || true)"
            if [ -z "$backend_container" ]; then
              echo "Backend container was not found after deploy."
              exit 1
            fi
            if [ -n "${KAJOVOMAIL_LOGIN_EMAIL:-}" ] && [ -n "${KAJOVOMAIL_LOGIN_PASSWORD:-}" ]; then
              echo "Ensuring bootstrap login user in backend database..."
              docker exec -i \
                -e KAJOVOMAIL_LOGIN_EMAIL="$KAJOVOMAIL_LOGIN_EMAIL" \
                -e KAJOVOMAIL_LOGIN_PASSWORD="$KAJOVOMAIL_LOGIN_PASSWORD" \
                "$backend_container" python -c $'import asyncio\nimport os\nfrom sqlalchemy import select\nfrom backend.app.db.session import AsyncSessionLocal\nfrom backend.app.models.tables import User\nfrom backend.app.services.auth import get_password_hash\n\nasync def main() -> None:\n    email = (os.environ.get("KAJOVOMAIL_LOGIN_EMAIL") or "").strip().lower()\n    password = os.environ.get("KAJOVOMAIL_LOGIN_PASSWORD") or ""\n    if not email or not password:\n        return\n    async with AsyncSessionLocal() as db:\n        result = await db.execute(select(User).where(User.email == email))\n        user = result.scalar_one_or_none()\n        if user is None:\n            user = User(email=email, hashed_password=get_password_hash(password), full_name="KajovoMail Admin", is_active=True, is_admin=True)\n            db.add(user)\n        else:\n            user.hashed_password = get_password_hash(password)\n            user.is_active = True\n            user.is_admin = True\n        await db.commit()\n\nasyncio.run(main())'
            fi
            docker exec "$backend_container" alembic -c backend/alembic.ini upgrade head || true
            db_container="$(docker ps --format '{{.Names}}' | grep '^kajovomail-db-' | head -n 1 || true)"
            if [ -z "$db_container" ]; then
              echo "Database container was not found after deploy."
              exit 1
            fi
            docker exec "$db_container" psql -U kajovo -d kajovo -v ON_ERROR_STOP=1 -c "ALTER TABLE users ADD COLUMN IF NOT EXISTS openai_api_key TEXT;"
            docker exec "$db_container" psql -U kajovo -d kajovo -v ON_ERROR_STOP=1 -c "ALTER TABLE users ADD COLUMN IF NOT EXISTS ai_response_style VARCHAR(32) NOT NULL DEFAULT 'balanced';"
            docker exec "$db_container" psql -U kajovo -d kajovo -v ON_ERROR_STOP=1 -c "ALTER TABLE users ADD COLUMN IF NOT EXISTS openai_model VARCHAR(64);"
            if [ -d /tmp/kajovomail-web-dist/web/dist ]; then
              uploaded_dist="/tmp/kajovomail-web-dist/web/dist"
            elif [ -f /tmp/kajovomail-web-dist/index.html ]; then
              uploaded_dist="/tmp/kajovomail-web-dist"
            else
              echo "Uploaded web dist was not found on server."
              exit 1
            fi
            echo "Using uploaded dist: $uploaded_dist"
            synced_roots=0
            for web_root in /var/www/mail.hcasc.cz /var/www/html /usr/share/nginx/html /opt/kajovomail/web/dist; do
              if [ -d "$web_root" ]; then
                echo "Syncing uploaded dist into: $web_root"
                if command -v sudo >/dev/null 2>&1; then
                  sudo cp -a "$uploaded_dist"/. "$web_root"/ || cp -a "$uploaded_dist"/. "$web_root"/ || true
                else
                  cp -a "$uploaded_dist"/. "$web_root"/ || true
                fi
                synced_roots=$((synced_roots + 1))
              fi
            done
            nginx_dump="$(sudo nginx -T 2>/dev/null || nginx -T 2>/dev/null || true)"
            if [ -n "$nginx_dump" ]; then
              for web_root in $(printf '%s\n' "$nginx_dump" | awk '/^[[:space:]]*root[[:space:]]+/ {print $2}' | tr -d ';' | sort -u); do
                if [ -n "$web_root" ] && [ -d "$web_root" ]; then
                  echo "Syncing uploaded dist into nginx root: $web_root"
                  if command -v sudo >/dev/null 2>&1; then
                    sudo cp -a "$uploaded_dist"/. "$web_root"/ || cp -a "$uploaded_dist"/. "$web_root"/ || true
                  else
                    cp -a "$uploaded_dist"/. "$web_root"/ || true
                  fi
                  synced_roots=$((synced_roots + 1))
                fi
              done
            fi
            if [ "$synced_roots" -eq 0 ]; then
              echo "No known web root directory exists on server."
              exit 1
            fi
            if command -v sudo >/dev/null 2>&1; then
              sudo nginx -t || nginx -t || true
              sudo systemctl reload nginx || systemctl reload nginx || true
            else
              nginx -t || true
              systemctl reload nginx || true
            fi
            for i in $(seq 1 20); do
              if curl -fsS http://127.0.0.1:18100/api/v1/health/live >/dev/null \
                && curl -fsS http://127.0.0.1:18100/api/v1/health/ready >/dev/null; then
                echo "Healthcheck OK (pokus $i)."
                exit 0
              fi
              echo "Cekam na backend... pokus $i/20"
              sleep 2
            done
            echo "Healthcheck timeout po 40s."
            exit 1

      - name: Verify auth error is localized (Czech)
        run: |
          set -euo pipefail
          for i in $(seq 1 20); do
            response="$(curl -sS -X POST https://mail.hcasc.cz/api/v1/auth/login \
              -H 'Content-Type: application/json' \
              -d '{"email":"invalid@hcasc.cz","password":"invalid"}' || true)"
            if echo "$response" | grep -q 'Neplatné přihlašovací údaje\|Invalid credentials'; then
              echo "Auth error response verification OK (attempt $i)."
              exit 0
            fi
            echo "Waiting for auth error response... attempt $i/20"
            sleep 3
          done
          echo "Auth error response verification failed."
          echo "Last response: $response"
          exit 1

      - name: Verify bootstrap login from secrets works
        env:
          LOGIN_EMAIL: ${{ secrets.KAJOVOMAIL_LOGIN_EMAIL }}
          LOGIN_PASSWORD: ${{ secrets.KAJOVOMAIL_LOGIN_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${LOGIN_EMAIL:-}" ] || [ -z "${LOGIN_PASSWORD:-}" ]; then
            echo "Bootstrap login secrets are missing."
            exit 1
          fi
          for i in $(seq 1 20); do
            response="$(curl -sS -X POST https://mail.hcasc.cz/api/v1/auth/login \
              -H 'Content-Type: application/json' \
              -d "{\"email\":\"${LOGIN_EMAIL}\",\"password\":\"${LOGIN_PASSWORD}\"}" || true)"
            if echo "$response" | grep -q 'session_token'; then
              echo "Bootstrap login verification OK (attempt $i)."
              exit 0
            fi
            echo "Waiting for bootstrap login to become available... attempt $i/20"
            sleep 3
          done
          echo "Bootstrap login verification failed."
          echo "Last response: $response"
          exit 1

      - name: Verify public web root serves KajovoMail
        run: |
          set -euo pipefail
          for i in $(seq 1 30); do
            body="$(curl -fsSL https://mail.hcasc.cz || true)"
            if echo "$body" | grep -q "<title>KajovoMail</title>"; then
              echo "Public web verification OK (attempt $i)."
              exit 0
            fi
            echo "Waiting for public web update... attempt $i/30"
            sleep 2
          done
          echo "Public web verification failed: KajovoMail title not found."
          exit 1
