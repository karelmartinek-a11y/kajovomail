name: Deploy

on:
  push:
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy To Production Server
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: SSH Deploy
        uses: appleboy/ssh-action@v1.2.0
        env:
          KAJOVOMAIL_LOGIN_EMAIL: ${{ vars.KAJOVOMAIL_LOGIN_EMAIL }}
          KAJOVOMAIL_LOGIN_PASSWORD: ${{ secrets.KAJOVOMAIL_LOGIN_PASSWORD }}
        with:
          host: ${{ secrets.PROD_HOST }}
          port: ${{ secrets.PROD_PORT }}
          username: ${{ secrets.PROD_USER }}
          password: ${{ secrets.PROD_PASSWORD }}
          script_stop: true
          command_timeout: 25m
          envs: KAJOVOMAIL_LOGIN_EMAIL,KAJOVOMAIL_LOGIN_PASSWORD
          script: |
            set -euo pipefail
            export KAJOVOMAIL_LOGIN_EMAIL
            export KAJOVOMAIL_LOGIN_PASSWORD
            /opt/kajovomail/bootstrap/deploy-local.sh
            backend_container="$(docker ps --format '{{.Names}}' | grep '^kajovomail-backend-' | head -n 1 || true)"
            if [ -z "$backend_container" ]; then
              echo "Backend container was not found after deploy."
              exit 1
            fi
            docker exec "$backend_container" alembic -c backend/alembic.ini upgrade head || true
            db_container="$(docker ps --format '{{.Names}}' | grep '^kajovomail-db-' | head -n 1 || true)"
            if [ -z "$db_container" ]; then
              echo "Database container was not found after deploy."
              exit 1
            fi
            docker exec "$db_container" psql -U kajovo -d kajovo -v ON_ERROR_STOP=1 -c "ALTER TABLE users ADD COLUMN IF NOT EXISTS openai_api_key TEXT;"
            docker exec "$db_container" psql -U kajovo -d kajovo -v ON_ERROR_STOP=1 -c "ALTER TABLE users ADD COLUMN IF NOT EXISTS ai_response_style VARCHAR(32) NOT NULL DEFAULT 'balanced';"
            docker exec "$db_container" psql -U kajovo -d kajovo -v ON_ERROR_STOP=1 -c "ALTER TABLE users ADD COLUMN IF NOT EXISTS openai_model VARCHAR(64);"
            col_count="$(docker exec "$db_container" psql -U kajovo -d kajovo -tAc \"SELECT count(*) FROM information_schema.columns WHERE table_name='users' AND column_name IN ('openai_api_key','ai_response_style','openai_model');\" | tr -d '[:space:]')"
            if [ "$col_count" != "3" ]; then
              echo "User AI settings columns are missing after deploy."
              exit 1
            fi
            for i in $(seq 1 20); do
              if curl -fsS http://127.0.0.1:18100/api/v1/health/live >/dev/null \
                && curl -fsS http://127.0.0.1:18100/api/v1/health/ready >/dev/null; then
                echo "Healthcheck OK (pokus $i)."
                exit 0
              fi
              echo "Cekam na backend... pokus $i/20"
              sleep 2
            done
            echo "Healthcheck timeout po 40s."
            exit 1
