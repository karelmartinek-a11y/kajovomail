version: "3.9"
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: kajovo
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: kajovo
    ports:
      - "5432:5432"
    volumes:
      - ./infra/data/postgres:/var/lib/postgresql/data
  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - ./infra/data/redis:/data
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ../backend/.env.example
    depends_on:
      - db
      - redis
    ports:
      - "8000:8000"
    command: uvicorn backend.app.main:app --host 0.0.0.0 --port 8000 --reload
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ../backend/.env.example
    depends_on:
      - redis
      - db
    command: celery -A backend.app.workers worker --loglevel=info
